<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tree Lab</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: #000;
      }
      body { overflow: hidden; font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      #sheet {
        position: relative;
        margin: 0;
        padding: 0;
        background: #000;
        line-height: 0;
        cursor: grab;
      }
      #sheet.dragging { cursor: grabbing; }
      #sheet.dragging .cell { cursor: grabbing; }
      #sheet canvas {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 0;
      }
      #cell-overlay {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 1;
      }
      .cell {
        position: absolute;
        pointer-events: auto;
        text-decoration: none;
        color: rgba(255, 255, 255, 0.75);
        outline: 1px solid rgba(255, 255, 255, 0.08);
        line-height: 1;
      }
      .cell .addr {
        position: absolute;
        top: 5px;
        left: 6px;
        font-size: 12px;
        letter-spacing: 0.5px;
      }
      .cell:hover {
        outline-color: rgba(255, 255, 255, 0.6);
        color: #fff;
      }
      .cell.blank {
        pointer-events: none;
        color: rgba(255, 255, 255, 0.4);
        outline-color: rgba(255, 255, 255, 0.06);
      }
    </style>
  </head>
  <body>
    <div id="sheet">
      <div id="cell-overlay"></div>
    </div>
    <script type="module" src="/src/workshop/tree-lab/treeLabWorkshop.js"></script>
  </body>
</html>
